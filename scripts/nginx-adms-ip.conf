# ZKTeco ADMS — raw-IP server block (port 80, no HTTPS redirect)
# This block allows ZKTeco biometric devices to reach /iclock/* via the
# server's bare IP address on plain HTTP. Devices cannot handle TLS and
# are often configured with an IP+port rather than a domain name.
#
# Install:
#   sudo cp nginx-adms-ip.conf /etc/nginx/conf.d/adms-ip.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# The APP_PORT placeholder below is replaced by configure-nginx-iclock.sh.

server {
    listen 80;
    server_name 31.97.207.109 _;    # raw IP + catch-all default

    # ── ZKTeco ADMS endpoints ─────────────────────────────────────────────
    # These MUST NOT redirect to HTTPS — ZKTeco firmware only speaks HTTP.
    location /iclock/ {
        proxy_pass         http://localhost:APP_PORT/iclock/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Block everything else on the raw-IP vhost
    location / {
        return 301 https://hrms.tbjvisionconnect.com$request_uri;
    }
}
