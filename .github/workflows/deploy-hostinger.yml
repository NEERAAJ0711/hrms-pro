name: CD — Deploy to Hostinger VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

jobs:
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.cjs   && echo "✅ Server bundle OK" || (echo "❌ Server bundle missing" && exit 1)
          test -f dist/public/index.html && echo "✅ Client bundle OK" || (echo "❌ Client bundle missing" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT || 22 }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create deployment package
        run: |
          tar --exclude='node_modules' -czf deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            migrations/ \
            scripts/
          ls -lh deploy.tar.gz

      - name: Upload package to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.HOSTINGER_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              deploy.tar.gz \
              ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:/tmp/hrms-deploy.tar.gz

      - name: Deploy on server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.HOSTINGER_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }} \
              "DATABASE_URL='$DATABASE_URL' SESSION_SECRET='$SESSION_SECRET' JWT_SECRET='$JWT_SECRET' bash -s" << 'ENDSSH'

            set -e
            APP_DIR="$HOME/hrms-pro"
            BACKUP_DIR="$HOME/hrms-pro-backup-$(date +%Y%m%d%H%M%S)"

            echo "▶ Deploying as user: $(whoami)"
            echo "▶ App directory: $APP_DIR"

            echo "▶ Backing up current deployment..."
            if [ -d "$APP_DIR" ]; then
              cp -r "$APP_DIR" "$BACKUP_DIR"
            fi

            echo "▶ Preparing app directory..."
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "▶ Extracting new build..."
            tar -xzf /tmp/hrms-deploy.tar.gz -C "$APP_DIR"
            rm /tmp/hrms-deploy.tar.gz

            echo "▶ Writing .env file..."
            {
              printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
              printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"
              printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
              printf 'NODE_ENV=production\n'
              printf 'PORT=5000\n'
            } > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"

            echo "▶ Installing production dependencies..."
            export PATH="$HOME/.nvm/versions/node/$(ls -1 $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$PATH" || true
            command -v npm || { echo "❌ npm not found. Please install Node.js on the VPS first (run hostinger-setup.sh)"; exit 1; }
            npm ci --omit=dev

            echo "▶ Running database migrations..."
            DATABASE_URL="$DATABASE_URL" node scripts/run-migrations.cjs

            echo "▶ Restarting app with PM2..."
            command -v pm2 || npm install -g pm2
            if pm2 list 2>/dev/null | grep -q "hrms-pro"; then
              pm2 reload hrms-pro --update-env
            else
              pm2 start ecosystem.config.cjs
            fi
            pm2 save

            echo "▶ Cleaning old backups (keeping last 3)..."
            ls -dt $HOME/hrms-pro-backup-* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            http://${{ secrets.HOSTINGER_HOST }}/api/auth/me || echo "000")
          echo "Health check HTTP status: $RESPONSE"
          if [ "$RESPONSE" = "401" ] || [ "$RESPONSE" = "200" ]; then
            echo "✅ App is responding correctly"
          else
            echo "⚠️  Unexpected response: $RESPONSE — check server logs"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
