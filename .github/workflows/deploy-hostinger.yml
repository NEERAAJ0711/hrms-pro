name: CD — Deploy to Hostinger VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: hostinger-prod-deploy
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.cjs        && echo "✅ Server bundle OK"      || (echo "❌ Server bundle missing"  && exit 1)
          test -f dist/public/index.html && echo "✅ Client bundle OK"      || (echo "❌ Client bundle missing"  && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Verify downloaded artifacts
        run: |
          test -f dist/index.cjs        && echo "✅ Server bundle OK" || (echo "❌ Server bundle missing" && exit 1)
          test -f dist/public/index.html && echo "✅ Client bundle OK" || (echo "❌ Client bundle missing" && exit 1)

      - name: Setup SSH key
        env:
          HOSTINGER_HOST_KEY: ${{ secrets.HOSTINGER_HOST_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -z "$HOSTINGER_HOST_KEY" ]; then
            echo "❌ HOSTINGER_HOST_KEY secret is not set. Aborting."
            exit 1
          fi

          PORT="${HOSTINGER_PORT:-22}"
          KNOWN_HOSTS=~/.ssh/known_hosts
          : > "$KNOWN_HOSTS"

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac
            rest=$(echo "$line" | awk '{ $1=""; sub(/^ /,""); print }')
            if [ "$PORT" = "22" ]; then
              printf '%s %s\n' "$HOSTINGER_HOST" "$rest" >> "$KNOWN_HOSTS"
            else
              printf '[%s]:%s %s\n' "$HOSTINGER_HOST" "$PORT" "$rest" >> "$KNOWN_HOSTS"
            fi
          done <<< "$HOSTINGER_HOST_KEY"

          chmod 600 "$KNOWN_HOSTS"

          if ! [ -s "$KNOWN_HOSTS" ]; then
            echo "❌ HOSTINGER_HOST_KEY did not yield any usable known_hosts entries."
            exit 1
          fi
          echo "✅ Pinned $(wc -l < "$KNOWN_HOSTS") host key entry(ies) for $HOSTINGER_HOST:$PORT"

      - name: Create deployment package
        run: |
          # Ensure all files are readable before archiving
          chmod -R a+r scripts/ migrations/ dist/ 2>/dev/null || true
          tar --exclude='node_modules' -czf deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            migrations/ \
            scripts/
          ls -lh deploy.tar.gz

      - name: Upload package to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.HOSTINGER_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              deploy.tar.gz \
              ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:/tmp/hrms-deploy-${{ github.run_id }}.tar.gz

      - name: Build env payload
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          umask 077
          {
            printf 'DATABASE_URL=%q\n'   "$DATABASE_URL"
            printf 'SESSION_SECRET=%q\n' "$SESSION_SECRET"
            printf 'JWT_SECRET=%q\n'     "$JWT_SECRET"
            printf 'GIT_COMMIT=%q\n'     "${GIT_COMMIT:-unknown}"
            printf 'BUILD_TIME=%q\n'     "${BUILD_TIME:-unknown}"
          } > deploy.env
          base64 -w0 deploy.env > deploy.env.b64
          rm -f deploy.env

      - name: Upload env payload to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.HOSTINGER_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              deploy.env.b64 \
              ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:/tmp/hrms-deploy-env-${{ github.run_id }}.b64
          rm -f deploy.env.b64

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.HOSTINGER_PORT || '22' }} \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }} \
              "DEPLOY_TAR='/tmp/hrms-deploy-${{ github.run_id }}.tar.gz' ENV_PAYLOAD='/tmp/hrms-deploy-env-${{ github.run_id }}.b64' bash -s" << 'ENDSSH'

            set -e

            # ── Decode secrets ────────────────────────────────────────────────
            ENV_FILE="$(mktemp)"
            chmod 600 "$ENV_FILE"
            trap 'rm -f "$ENV_PAYLOAD" "$ENV_FILE"' EXIT
            if [ ! -f "$ENV_PAYLOAD" ]; then
              echo "❌ Env payload missing at $ENV_PAYLOAD"; exit 1
            fi
            base64 -d "$ENV_PAYLOAD" > "$ENV_FILE"
            rm -f "$ENV_PAYLOAD"
            set -a; . "$ENV_FILE"; set +a
            rm -f "$ENV_FILE"
            trap - EXIT

            # ── Paths ────────────────────────────────────────────────────────
            # Deploy to $HOME/hrms-app — NOT htdocs/ which is owned by the
            # web server user and not writable by the SSH deploy user.
            # nginx proxies to port 8080 regardless of where files live.
            APP_DIR="$HOME/hrms-app"
            BACKUP_DIR="$HOME/hrms-app-backup-$(date +%Y%m%d%H%M%S)"

            echo "▶ Deploying as: $(whoami)"
            echo "▶ App directory: $APP_DIR"

            # ── Backup by moving the whole dir ───────────────────────────────
            # We move (not copy) the existing dir to the backup location.
            # Moving operates on the PARENT directory (htdocs/), which the
            # deploy user owns — this avoids "Permission denied" errors that
            # occur when individual files inside were created by another user.
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$BACKUP_DIR"
              echo "▶ Backup moved to: $BACKUP_DIR"
            fi

            # ── Extract new build into a fresh directory ──────────────────────
            mkdir -p "$APP_DIR"
            tar -xzf "$DEPLOY_TAR" -C "$APP_DIR"
            rm -f "$DEPLOY_TAR"
            echo "▶ Build extracted to $APP_DIR"

            # ── Write .env ────────────────────────────────────────────────────
            {
              printf 'DATABASE_URL=%s\n'   "$DATABASE_URL"
              printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"
              printf 'JWT_SECRET=%s\n'     "$JWT_SECRET"
              printf 'NODE_ENV=production\n'
              printf 'PORT=8080\n'
              printf 'GIT_COMMIT=%s\n'     "${GIT_COMMIT:-unknown}"
              printf 'BUILD_TIME=%s\n'     "${BUILD_TIME:-unknown}"
            } > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            echo "▶ .env written"

            # ── Check disk space before heavy operations ──────────────────────
            AVAIL_KB=$(df -k "$HOME" | awk 'NR==2{print $4}')
            echo "▶ Disk available: $((AVAIL_KB/1024)) MB"
            if [ "$AVAIL_KB" -lt 524288 ]; then   # less than 512 MB
              echo "⚠️  Low disk space — cleaning npm cache and old backups..."
              npm cache clean --force 2>/dev/null || true
              ls -dt "$HOME"/hrms-app-backup-* 2>/dev/null | tail -n +2 | xargs rm -rf 2>/dev/null || true
              ls -dt "$HOME"/hrms-pro-backup-* 2>/dev/null | xargs rm -rf 2>/dev/null || true
              AVAIL_KB=$(df -k "$HOME" | awk 'NR==2{print $4}')
              echo "▶ Disk after cleanup: $((AVAIL_KB/1024)) MB"
              if [ "$AVAIL_KB" -lt 262144 ]; then  # still less than 256 MB
                echo "❌ Not enough disk space ($((AVAIL_KB/1024)) MB). SSH in and free space first."; exit 1
              fi
            fi

            # ── Install production dependencies ───────────────────────────────
            cd "$APP_DIR"
            # Add nvm node to PATH if present
            NVM_NODE=$(ls -1 "$HOME/.nvm/versions/node" 2>/dev/null | tail -1)
            [ -n "$NVM_NODE" ] && export PATH="$HOME/.nvm/versions/node/$NVM_NODE/bin:$PATH"
            command -v npm || { echo "❌ npm not found — install Node.js first"; exit 1; }
            npm ci --omit=dev
            echo "▶ Dependencies installed"

            # ── Run database migrations ───────────────────────────────────────
            node scripts/run-migrations.cjs
            echo "▶ Migrations done"

            # ── Free port 8080 ────────────────────────────────────────────────
            # Kill any orphaned process holding 8080 (e.g. old node apps,
            # failed deploys, other PM2 instances from a different user).
            OLD_PID=$(ss -tlnp 2>/dev/null | grep ':8080 ' | grep -oP 'pid=\K[0-9]+' | head -1 || true)
            if [ -n "$OLD_PID" ]; then
              echo "▶ Killing process $OLD_PID on port 8080"
              kill -9 "$OLD_PID" 2>/dev/null || true
              sleep 2
            fi
            # Belt-and-suspenders: fuser if available
            fuser -k 8080/tcp 2>/dev/null || true

            # ── Restart with PM2 ──────────────────────────────────────────────
            command -v pm2 || npm install -g pm2
            pm2 delete hrms-pro 2>/dev/null || true
            sleep 2
            pm2 start ecosystem.config.cjs --update-env
            pm2 save
            echo "▶ PM2 restarted"

            # ── Health check ──────────────────────────────────────────────────
            sleep 5
            UP=0
            for i in $(seq 1 12); do
              if curl -fsS "http://127.0.0.1:8080/api/version" > /tmp/ver.json 2>/dev/null; then
                echo "✅ Server is up on port 8080:"
                cat /tmp/ver.json; echo
                UP=1; break
              fi
              echo "  waiting... ($i/12)"
              sleep 5
            done

            if [ "$UP" != "1" ]; then
              echo "❌ Server did not come up on port 8080 — PM2 logs:"
              pm2 logs hrms-pro --lines 50 --nostream || true
              exit 1
            fi

            # ── Debug: PM2 status + ports ─────────────────────────────────────
            echo "=== PM2 STATUS ==="
            pm2 list
            echo "=== PORTS (80/443/3000/8080) ==="
            ss -tlnp | grep -E ':80 |:443 |:3000 |:8080 ' || echo "(none of those ports)"
            echo "=== ALL LISTENING PORTS ==="
            ss -tlnp

            # ── Detect web server ─────────────────────────────────────────────
            echo "=== WEB SERVER DETECTION ==="
            which nginx   2>/dev/null && echo "nginx: $(nginx -v 2>&1)"   || echo "nginx: not in PATH"
            which apache2 2>/dev/null && echo "apache2 present"           || echo "apache2: not found"
            which lsws    2>/dev/null && echo "lsws: present"             || echo "lsws: not found"
            ls /usr/local/lsws/bin/lswsctrl 2>/dev/null && echo "OpenLiteSpeed present" || echo "OpenLiteSpeed: not found"
            systemctl list-units --type=service --state=running 2>/dev/null | grep -iE "nginx|apache|lsws|litespeed|caddy" || true
            ps aux | grep -iE "nginx|apache|lsws|litespeed" | grep -v grep | head -5 || echo "(no web server processes)"

            # ── Dump merged nginx config (shows all proxy_pass, server blocks) ─
            echo "=== NGINX -T DUMP (proxy_pass / server_name / listen) ==="
            nginx -T 2>/dev/null | grep -E "proxy_pass|server_name|listen|root|include" | head -60 || echo "nginx -T failed (not running or not in PATH)"

            # ── Broad search for domain in ALL config files ───────────────────
            DOMAIN="tbjvisionconnect.com"
            echo "=== SEARCH: $DOMAIN in all configs ==="
            grep -rl "$DOMAIN" /etc /usr/local /home 2>/dev/null | grep -v ".bak\|.log\|binary" | head -20 || echo "Domain not found in any config file"

            # ── List all web server config files ──────────────────────────────
            echo "=== NGINX CONF FILES ==="
            find /etc/nginx /usr/local/nginx 2>/dev/null -name "*.conf" | head -20 || echo "(no nginx conf dirs found)"
            echo "=== LSWS CONF FILES ==="
            find /usr/local/lsws /etc/lsws 2>/dev/null -name "*.conf" | head -20 || echo "(no lsws conf dirs found)"
            echo "=== APACHE CONF FILES ==="
            find /etc/apache2 /etc/httpd 2>/dev/null -name "*.conf" | head -20 || echo "(no apache conf dirs found)"
            echo "=== HOME CONF DIRS ==="
            find /home -maxdepth 4 -name "*.conf" 2>/dev/null | head -20 || true

            # ── If nginx is found, try to fix proxy_pass for the domain ───────
            NGINX_CONF=$(grep -rl "$DOMAIN" /etc /usr/local /home 2>/dev/null | grep -iE "\.conf$" | grep -v ".bak" | head -1 || true)
            if [ -n "$NGINX_CONF" ]; then
              echo "=== FOUND CONFIG: $NGINX_CONF ==="
              cat "$NGINX_CONF"
              echo "=== END CONFIG ==="
              if ! grep -q "8080" "$NGINX_CONF"; then
                echo "▶ Fixing proxy_pass → http://127.0.0.1:8080"
                sed -i 's|proxy_pass http://[^;]*;|proxy_pass http://127.0.0.1:8080;|g' "$NGINX_CONF"
                nginx -t 2>&1 && { systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || true; }
                echo "▶ Web server config reloaded"
              else
                echo "▶ Config already has 8080 — reloading web server"
                nginx -s reload 2>/dev/null || systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || true
              fi
            else
              echo "▶ Could not find a config file for $DOMAIN — manual nginx setup required"
            fi

            # ── Clean old backups ─────────────────────────────────────────────
            ls -dt "$HOME"/hrms-pro-backup-* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Verify live site
        run: |
          sleep 10
          HOST="${{ secrets.HOSTINGER_HOST }}"
          echo "▶ Checking $HOST/api/auth/me ..."
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://$HOST/api/auth/me" 2>/dev/null \
            || curl -sL -o /dev/null -w "%{http_code}" --max-time 30 \
            "http://$HOST/api/auth/me" 2>/dev/null \
            || echo "000")
          echo "  HTTP status: $STATUS"
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
            echo "✅ Site is live and responding"
          else
            echo "⚠️  Unexpected status $STATUS — check nginx proxy_pass → port 8080"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}"
