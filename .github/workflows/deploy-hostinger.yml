name: CD — Deploy to Hostinger VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: hostinger-prod-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.cjs        && echo "✅ Server bundle OK"      || (echo "❌ Server bundle missing"  && exit 1)
          test -f dist/public/index.html && echo "✅ Client bundle OK"      || (echo "❌ Client bundle missing"  && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Verify downloaded artifacts
        run: |
          test -f dist/index.cjs        && echo "✅ Server bundle OK" || (echo "❌ Server bundle missing" && exit 1)
          test -f dist/public/index.html && echo "✅ Client bundle OK" || (echo "❌ Client bundle missing" && exit 1)

      - name: Setup SSH key
        env:
          HOSTINGER_HOST_KEY: ${{ secrets.HOSTINGER_HOST_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -z "$HOSTINGER_HOST_KEY" ]; then
            echo "❌ HOSTINGER_HOST_KEY secret is not set. Aborting."
            exit 1
          fi

          PORT="${HOSTINGER_PORT:-22}"
          KNOWN_HOSTS=~/.ssh/known_hosts
          : > "$KNOWN_HOSTS"

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac
            rest=$(echo "$line" | awk '{ $1=""; sub(/^ /,""); print }')
            if [ "$PORT" = "22" ]; then
              printf '%s %s\n' "$HOSTINGER_HOST" "$rest" >> "$KNOWN_HOSTS"
            else
              printf '[%s]:%s %s\n' "$HOSTINGER_HOST" "$PORT" "$rest" >> "$KNOWN_HOSTS"
            fi
          done <<< "$HOSTINGER_HOST_KEY"

          chmod 600 "$KNOWN_HOSTS"

          if ! [ -s "$KNOWN_HOSTS" ]; then
            echo "❌ HOSTINGER_HOST_KEY did not yield any usable known_hosts entries."
            exit 1
          fi
          echo "✅ Pinned $(wc -l < "$KNOWN_HOSTS") host key entry(ies) for $HOSTINGER_HOST:$PORT"

      - name: Pre-flight connectivity check
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          PORT="${HOSTINGER_PORT:-22}"
          ok=0
          for attempt in 1 2 3 4 5 6; do
            if timeout 15 bash -c "cat < /dev/null > /dev/tcp/$HOSTINGER_HOST/$PORT" 2>/dev/null; then
              echo "✅ VPS SSH port $PORT reachable (attempt $attempt)"
              ok=1; break
            fi
            echo "⏳ SSH port $PORT not reachable from this runner yet (attempt $attempt/6) — retrying in 15s..."
            sleep 15
          done
          if [ "$ok" != "1" ]; then
            echo "❌ Cannot reach the VPS SSH port from this GitHub runner after 6 attempts (connection timed out)."
            echo "   The VPS itself may still be up (the website can respond) — this is a connection block"
            echo "   between GitHub Actions and the VPS. Most likely one of:"
            echo "     1. fail2ban has banned this runner's IP (repeated deploys) — on the VPS run:"
            echo "          sudo fail2ban-client status sshd   (then: sudo fail2ban-client set sshd unbanip <IP>)"
            echo "     2. A firewall (ufw/iptables/Hostinger hPanel) restricts SSH to specific IPs."
            echo "     3. The HOSTINGER_PORT secret does not match the VPS SSH port."
            exit 1
          fi

      - name: Create deployment package
        run: |
          # Ensure all files are readable before archiving
          chmod -R a+r scripts/ migrations/ dist/ 2>/dev/null || true
          tar --exclude='node_modules' -czf deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            migrations/ \
            scripts/
          ls -lh deploy.tar.gz

      - name: Upload package to server
        env:
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PORT="${HOSTINGER_PORT:-22}"
          ok=0
          for attempt in 1 2 3 4 5; do
            if scp -i ~/.ssh/deploy_key \
                -P "$PORT" \
                -o StrictHostKeyChecking=yes \
                -o UserKnownHostsFile=~/.ssh/known_hosts \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=4 \
                deploy.tar.gz \
                "$HOSTINGER_USERNAME@$HOSTINGER_HOST:/tmp/hrms-deploy-$RUN_ID.tar.gz"; then
              echo "✅ Package uploaded (attempt $attempt)"
              ok=1; break
            fi
            echo "⏳ Package upload failed (attempt $attempt/5) — retrying in 20s..."
            sleep 20
          done
          [ "$ok" = "1" ] || { echo "❌ Package upload failed after 5 attempts (connection timeout to VPS)."; exit 1; }

      - name: Build env payload
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          umask 077
          {
            printf 'DATABASE_URL=%q\n'   "$DATABASE_URL"
            printf 'SESSION_SECRET=%q\n' "$SESSION_SECRET"
            printf 'JWT_SECRET=%q\n'     "$JWT_SECRET"
            printf 'GIT_COMMIT=%q\n'     "${GIT_COMMIT:-unknown}"
            printf 'BUILD_TIME=%q\n'     "${BUILD_TIME:-unknown}"
          } > deploy.env
          base64 -w0 deploy.env > deploy.env.b64
          rm -f deploy.env

      - name: Upload env payload to server
        env:
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PORT="${HOSTINGER_PORT:-22}"
          ok=0
          for attempt in 1 2 3 4 5; do
            if scp -i ~/.ssh/deploy_key \
                -P "$PORT" \
                -o StrictHostKeyChecking=yes \
                -o UserKnownHostsFile=~/.ssh/known_hosts \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=4 \
                deploy.env.b64 \
                "$HOSTINGER_USERNAME@$HOSTINGER_HOST:/tmp/hrms-deploy-env-$RUN_ID.b64"; then
              echo "✅ Env payload uploaded (attempt $attempt)"
              ok=1; break
            fi
            echo "⏳ Env payload upload failed (attempt $attempt/5) — retrying in 20s..."
            sleep 20
          done
          rm -f deploy.env.b64
          [ "$ok" = "1" ] || { echo "❌ Env payload upload failed after 5 attempts (connection timeout to VPS)."; exit 1; }

      - name: Deploy on server
        env:
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PORT="${HOSTINGER_PORT:-22}"
          ok=0
          for attempt in 1 2 3; do
            ERRLOG="/tmp/ssh_deploy_err_$attempt.log"
            set +e
            ssh -i ~/.ssh/deploy_key \
                -p "$PORT" \
                -o StrictHostKeyChecking=yes \
                -o UserKnownHostsFile=~/.ssh/known_hosts \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=8 \
                "$HOSTINGER_USERNAME@$HOSTINGER_HOST" \
                "DEPLOY_TAR='/tmp/hrms-deploy-$RUN_ID.tar.gz' ENV_PAYLOAD='/tmp/hrms-deploy-env-$RUN_ID.b64' bash -s" \
                < scripts/remote-deploy.sh 2> >(tee "$ERRLOG" >&2)
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              ok=1; break
            fi
            # exit 255 = ssh client error; classify auth/host-key (do NOT retry) vs network timeout (retry)
            if grep -qiE "Permission denied|Host key verification failed|Too many authentication failures" "$ERRLOG" 2>/dev/null; then
              echo "❌ SSH authentication / host-key failure (not a network block). Check the HOSTINGER_SSH_KEY and HOSTINGER_HOST_KEY secrets. Not retrying."
              exit "$code"
            fi
            if [ "$code" -eq 255 ]; then
              echo "⏳ SSH connection failed (exit 255, likely timeout/network block) on attempt $attempt/3 — retrying in 20s..."
              sleep 20
              continue
            fi
            echo "❌ Remote deploy script failed with exit code $code (server-side error, not a connection issue) — not retrying."
            exit "$code"
          done
          [ "$ok" = "1" ] || { echo "❌ SSH connection to the VPS failed after 3 attempts (connection timeout). The VPS is likely blocking GitHub Actions IPs (firewall/fail2ban). Server-side action required — see the pre-flight step output."; exit 1; }

      - name: Verify live site
        run: |
          sleep 10
          HOST="${{ secrets.HOSTINGER_HOST }}"
          echo "▶ Checking $HOST/api/auth/me ..."
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://$HOST/api/auth/me" 2>/dev/null \
            || curl -sL -o /dev/null -w "%{http_code}" --max-time 30 \
            "http://$HOST/api/auth/me" 2>/dev/null \
            || echo "000")
          echo "  HTTP status: $STATUS"
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
            echo "✅ Site is live and responding"
          else
            echo "⚠️  Unexpected status $STATUS — check nginx proxy_pass → port 8080"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }} on branch ${{ github.ref_name }}"
