name: Build Flutter APK

on:
  push:
    branches: [main, master]
    paths:
      - 'flutter_app/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393" || true

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flutter_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flutter_app/android/local.properties
          cat flutter_app/android/local.properties

      - name: Bump version in pubspec.yaml
        run: |
          BUILD=${{ github.run_number }}
          sed -i "s/^version: .*/version: 1.0.${BUILD}+${BUILD}/" flutter_app/pubspec.yaml
          echo "Version set to 1.0.${BUILD}+${BUILD}"
          grep "^version:" flutter_app/pubspec.yaml

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Make gradlew executable
        run: chmod +x flutter_app/android/gradlew

      - name: Build APK (release)
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=BASE_URL=${{ secrets.HOSTINGER_APP_URL }} \
            2>&1 | tee /tmp/flutter-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            ERROR=$(grep -B1 -A6 "What went wrong\|^[^ ]*\.dart:[0-9]\|Error:\|Unhandled exception\|Cannot find\|BUILD FAILED\|Caused by\|cannot find symbol" /tmp/flutter-build.log | head -100 | tr '\n' '~')
            echo "::error::BUILD ERROR: $ERROR"
            exit 1
          fi

      - name: Rename APK with version info
        run: |
          mkdir -p artifacts
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             artifacts/hrms-mobile-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hrms-mobile-apk-${{ github.run_number }}
          path: artifacts/hrms-mobile-${{ github.run_number }}.apk
          retention-days: 30

      - name: Deploy APK and version.json to server
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_USERNAME }}
          HOST_KEY: ${{ secrets.HOSTINGER_HOST_KEY }}
          APP_URL: ${{ secrets.HOSTINGER_APP_URL }}
        run: |
          BUILD=${{ github.run_number }}
          DOWNLOAD_URL="${APP_URL}/uploads/downloads/hrms-latest.apk"
          PORT=${SSH_PORT:-22}

          # Write SSH key and known hosts
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts

          # Create version.json locally (single-line printf avoids YAML indentation issues)
          printf '{"version":"1.0.%s","buildNumber":%s,"downloadUrl":"%s","releaseNotes":"Bug fixes and improvements","mandatory":false}\n' \
            "$BUILD" "$BUILD" "$DOWNLOAD_URL" > /tmp/version.json

          echo "version.json contents:"
          cat /tmp/version.json

          # Create downloads dir on server
          ssh -i ~/.ssh/deploy_key -p "$PORT" "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ~/hrms-pro/uploads/downloads"

          # Upload APK
          scp -i ~/.ssh/deploy_key -P "$PORT" \
            "artifacts/hrms-mobile-${BUILD}.apk" \
            "${SSH_USER}@${SSH_HOST}:~/hrms-pro/uploads/downloads/hrms-latest.apk"

          # Upload version.json
          scp -i ~/.ssh/deploy_key -P "$PORT" \
            /tmp/version.json \
            "${SSH_USER}@${SSH_HOST}:~/hrms-pro/uploads/downloads/version.json"

          echo "Deployed APK + version.json to server (build ${BUILD})"
