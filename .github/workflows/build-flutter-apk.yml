name: Build Flutter APK

on:
  push:
    branches: [main, master]
    paths:
      - 'flutter_app/**'
  workflow_dispatch:

concurrency:
  group: flutter-apk-build
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393" || true

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flutter_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flutter_app/android/local.properties
          cat flutter_app/android/local.properties

      - name: Bump version in pubspec.yaml
        run: |
          BUILD=${{ github.run_number }}
          sed -i "s/^version: .*/version: 1.0.${BUILD}+${BUILD}/" flutter_app/pubspec.yaml
          echo "Version set to 1.0.${BUILD}+${BUILD}"
          grep "^version:" flutter_app/pubspec.yaml

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Make gradlew executable
        run: chmod +x flutter_app/android/gradlew

      - name: Build APK (release)
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=BASE_URL=${{ secrets.HOSTINGER_APP_URL }} \
            --split-debug-info=build/symbols \
            --tree-shake-icons \
            2>&1 | tee /tmp/flutter-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            ERROR=$(grep -B1 -A6 "What went wrong\|^[^ ]*\.dart:[0-9]\|Error:\|Unhandled exception\|Cannot find\|BUILD FAILED\|Caused by\|cannot find symbol" /tmp/flutter-build.log | head -100 | tr '\n' '~')
            echo "::error::BUILD ERROR: $ERROR"
            exit 1
          fi

      - name: Rename APK with version info
        run: |
          mkdir -p artifacts
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             artifacts/hrms-mobile-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: hrms-mobile-apk-${{ github.run_number }}
          path: artifacts/hrms-mobile-${{ github.run_number }}.apk
          retention-days: 30

      - name: Setup SSH key
        env:
          HOSTINGER_HOST_KEY: ${{ secrets.HOSTINGER_HOST_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -z "$HOSTINGER_HOST_KEY" ]; then
            echo "❌ HOSTINGER_HOST_KEY secret is not set. Aborting to avoid MITM risk."
            exit 1
          fi

          PORT="${HOSTINGER_PORT:-22}"
          KNOWN_HOSTS=~/.ssh/known_hosts
          : > "$KNOWN_HOSTS"

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac
            rest=$(echo "$line" | awk '{ $1=""; sub(/^ /,""); print }')
            if [ "$PORT" = "22" ]; then
              printf '%s %s\n' "$HOSTINGER_HOST" "$rest" >> "$KNOWN_HOSTS"
            else
              printf '[%s]:%s %s\n' "$HOSTINGER_HOST" "$PORT" "$rest" >> "$KNOWN_HOSTS"
            fi
          done <<< "$HOSTINGER_HOST_KEY"

          chmod 600 "$KNOWN_HOSTS"

          if ! [ -s "$KNOWN_HOSTS" ]; then
            echo "❌ HOSTINGER_HOST_KEY did not yield any usable known_hosts entries."
            exit 1
          fi
          echo "✅ Pinned $(wc -l < "$KNOWN_HOSTS") host key entry(ies) for $HOSTINGER_HOST:$PORT"

      - name: Deploy APK and version.json to server
        env:
          APP_URL: ${{ secrets.HOSTINGER_APP_URL }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          BUILD=${{ github.run_number }}
          PORT="${HOSTINGER_PORT:-22}"
          DOWNLOAD_URL="${APP_URL}/uploads/downloads/hrms-latest.apk"

          printf '{"version":"1.0.%s","buildNumber":%s,"downloadUrl":"%s","releaseNotes":"Bug fixes and improvements","mandatory":false}\n' \
            "$BUILD" "$BUILD" "$DOWNLOAD_URL" > /tmp/version.json

          echo "version.json contents:"
          cat /tmp/version.json

          ssh -i ~/.ssh/deploy_key \
              -p "$PORT" \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${HOSTINGER_USERNAME}@${HOSTINGER_HOST}" \
              "mkdir -p ~/hrms-pro/uploads/downloads"

          scp -i ~/.ssh/deploy_key \
              -P "$PORT" \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "artifacts/hrms-mobile-${BUILD}.apk" \
              "${HOSTINGER_USERNAME}@${HOSTINGER_HOST}:~/hrms-pro/uploads/downloads/hrms-latest.apk"

          scp -i ~/.ssh/deploy_key \
              -P "$PORT" \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              /tmp/version.json \
              "${HOSTINGER_USERNAME}@${HOSTINGER_HOST}:~/hrms-pro/uploads/downloads/version.json"

          echo "✅ APK and version.json deployed to server (build ${BUILD})"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Flutter APK build/deploy failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
