name: Build Flutter APK

on:
  push:
    branches: [main, master]
    paths:
      - 'flutter_app/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393" || true
          echo "NDK install done"

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > flutter_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flutter_app/android/local.properties
          cat flutter_app/android/local.properties

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Make gradlew executable
        run: chmod +x flutter_app/android/gradlew

      - name: Build APK (release)
        working-directory: flutter_app
        run: |
          flutter build apk --release --verbose \
            --dart-define=BASE_URL=${{ secrets.HOSTINGER_APP_URL }} 2>&1 | tail -100
        continue-on-error: true

      - name: Check build output
        run: |
          if [ -f flutter_app/build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK built successfully"
            ls -lh flutter_app/build/app/outputs/flutter-apk/
          else
            echo "❌ APK not found — dumping gradle log"
            find flutter_app -name "*.log" -newer flutter_app/pubspec.yaml 2>/dev/null | xargs cat 2>/dev/null || true
            exit 1
          fi

      - name: Rename APK with version info
        run: |
          mkdir -p artifacts
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             artifacts/hrms-mobile-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hrms-mobile-apk-${{ github.run_number }}
          path: artifacts/hrms-mobile-${{ github.run_number }}.apk
          retention-days: 30
