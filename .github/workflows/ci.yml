name: CI — Build & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: TypeScript Check & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hrms
          POSTGRES_PASSWORD: hrms_password
          POSTGRES_DB: hrms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://hrms:hrms_password@localhost:5432/hrms_test
      SESSION_SECRET: ci_test_secret_key_not_for_production
      JWT_SECRET: ci_jwt_secret_key_not_for_production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking dist/index.cjs..."
          test -f dist/index.cjs && echo "✅ Server bundle found" || (echo "❌ Server bundle missing" && exit 1)
          echo "Checking dist/public/index.html..."
          test -f dist/public/index.html && echo "✅ Client bundle found" || (echo "❌ Client bundle missing" && exit 1)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
